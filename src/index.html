<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goblin Game</title>
</head>
<body>
    <div class="container">
        <h1>🃏 Найди гнома! 🃏</h1>
        <div class="game-board" id="gameBoard"></div>
        <div class="controls">
            <button id="stopGameBtn" class="btn btn-stop">⏹️ Остановить игру</button>
            <button id="startGameBtn" class="btn btn-start">▶️ Запустить игру</button>
        </div>
        <div class="game-status" id="gameStatus">
            Статус: <span class="status-text">Игра активна</span>
        </div>
    </div>
</body>
</html>
